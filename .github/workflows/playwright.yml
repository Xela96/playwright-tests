name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Choose environment'
        required: true
        default: 'production'
        type: choice
        options:
          - local
          - production
      test_type:
        description: 'Choose test type'
        required: false
        default: "none"
        type: choice
        options:
          - none
          - smoke
          - functional
          - regression
          - search
          - filter
          - navigation
          - sample
jobs:
  test-site:
    env:
      environment: ${{ github.event.inputs.environment }}
      TEST_TYPE: ${{ github.event.inputs.test_type }}

    runs-on: ubuntu-latest
    steps:
      # --- Checkout repos ---
      - name: Checkout test repo
        uses: actions/checkout@v3

      - name: Checkout personal website repo
        uses: actions/checkout@v3
        with:
          repository: Xela96/personal-website
          ref: fix-project-for-local-testing
          path: personal-website

      # --- Setup Node ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 16

      # --- Install npm latest ---
      - name: Upgrade npm
        run: npm install npm@latest

      # --- Install dependencies for Playwright tests ---
      - name: Install test dependencies
        uses: bahmutov/npm-install@v1
      
      # --- Setup and run Flask site ---
      - name: Install Python deps
        run: pip install -r personal-website/requirements.txt

      # --- File check ---
      - name: List files in current directory
        run: ls -la ./personal-website
        if: ${{ env.environment == 'local' }}

      - name: Run Flask app
        if: ${{ env.environment == 'local' }}
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL  }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          SUPABASE_DB: ${{ secrets.SUPABASE_DB }}
          SUPABASE_HOST: ${{ secrets.SUPABASE_HOST }}
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
          SUPABASE_PORT: ${{ secrets.SUPABASE_PORT }}
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
        run: |
          cd personal-website
          export FLASK_APP=app.py
          flask run --host=0.0.0.0 --port=5000 &
          for i in {1..40}; do
            if curl -s http://127.0.0.1:5000/projects > /dev/null; then
              echo "Flask server is up"
              break
            fi
            echo "Waiting for Flask server..."
            sleep 1
          done
        shell: bash

      - name: Show Flask logs if server fails
        if: ${{ env.environment == 'local' }}
        run: tail -n 50 personal-website/flask.log

      # --- Setup URL to run tests on ---
      - name: Set TEST_URL based on environment
        run: |
          if [ "${environment}" = "production" ]; then
            echo "TEST_URL=https://dohertyalex.cc/" >> $GITHUB_ENV
          else
            echo "TEST_URL=http://127.0.0.1:5000" >> $GITHUB_ENV
          fi
      - name: Print TEST_URL
        run: echo "TEST_URL is $TEST_URL"
      
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps


      # --- Server check ---
      - name: Check if site is up
        run: |
          curl -v http://127.0.0.1:5000/ || true
          tail -n 50 personal-website/*.log || true
        if: ${{ env.environment == 'local' }}

      # --- Database check ---
      - name: Check if projects have been populated
        run: curl -v http://127.0.0.1:5000/projects || exit 1
        if: ${{ env.environment == 'local' }}
        


      # --- Run Playwright tests ---
      - name: Run Playwright tests with no tag
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}

        if : ${{ env.TEST_TYPE == 'none' }}
        run: npx playwright test
        working-directory: .

      # --- Run Playwright tests with a test tag ---
      - name: Run Playwright tests with tag
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          TEST_TYPE: ${{ env.TEST_TYPE }}
          TEST_URL: ${{ env.TEST_URL }}
        if: ${{ env.TEST_TYPE == 'smoke' || env.TEST_TYPE == 'functional' || env.TEST_TYPE == 'regression' || env.TEST_TYPE == 'search' || env.TEST_TYPE == 'filter' || env.TEST_TYPE == 'navigation' || env.TEST_TYPE == 'sample'}}
        run: npx playwright test --grep=@${{ env.TEST_TYPE }}
        working-directory: .

      # --- Upload Playwright test report ---
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30